<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Latent Library - Initializing</title>
    <style>
        :root {
            /* --- Main Backgrounds --- */
            --bg-app: #000000;
            --bg-app-image: radial-gradient(circle at 15% 25%, rgba(102, 252, 241, 0.08) 0%, transparent 40%),
                            radial-gradient(circle at 85% 75%, rgba(216, 112, 255, 0.08) 0%, transparent 40%);

            /* --- Text --- */
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;

            /* --- Accents & Gradients --- */
            --accent-primary: #66fcf1;
            --accent-secondary: #d870ff;
            --grad-text: linear-gradient(90deg, #66fcf1, #d870ff);
            --grad-hover: linear-gradient(135deg, #66fcf1 0%, #d870ff 100%);

            /* --- Borders --- */
            --border-input: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-app);
            background-image: var(--bg-app-image);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            user-select: none;
            -webkit-app-region: drag;
            border: 1px solid var(--border-input);
            box-sizing: border-box;
            overflow: hidden;
        }

        .container {
            text-align: center;
            position: relative;
            z-index: 1;
        }

        .logo {
            width: 100px;
            height: 100px;
            margin-bottom: 20px;
            display: block;
            margin-left: auto;
            margin-right: auto;
            /* Neon glow effect matching the theme */
            filter: drop-shadow(0 0 15px rgba(102, 252, 241, 0.3));
        }

        h1 {
            font-size: 24px;
            margin: 0 0 10px 0;
            font-weight: 600;
            letter-spacing: 0.5px;
            background: var(--grad-text);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(102, 252, 241, 0.2);
        }

        p {
            font-size: 14px;
            color: var(--text-secondary);
            margin: 0 0 30px 0;
            font-weight: 500;
        }

        .loader {
            width: 200px;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            overflow: hidden;
            position: relative;
            margin: 0 auto;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        }

        .loader::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 50%;
            background: var(--grad-hover);
            animation: loading 1.5s infinite ease-in-out;
            transform: translateX(-100%);
            box-shadow: 0 0 15px var(--accent-primary);
        }

        @keyframes loading {
            0% {
                transform: translateX(-100%);
            }
            100% {
                transform: translateX(200%);
            }
        }
    </style>
</head>
<body>
<div class="container">
    <img src="../frontend/src/assets/icon.png" class="logo" alt="Latent Library Logo">
    <h1>Latent Library</h1>
    <p>Initializing Application Core...</p>
    <div class="loader"></div>
</div>
</body>
</html>
