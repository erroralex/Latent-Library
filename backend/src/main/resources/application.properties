spring.application.name=backend
spring.threads.virtual.enabled=true
server.port=0

# Allow UI uploads up to 50MB
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# --- Application Configuration ---

# Indexing Service
app.indexing.batch-size=20
app.indexing.debounce-ms=500
app.indexing.watch-retry-ms=5000

# Thumbnail Service
app.thumbnails.size=300
app.thumbnails.quality=0.85
app.thumbnails.stripe-count=128
# Max concurrent CPU-intensive thumbnail jobs. Default is (cores - 2), min 2.
# app.thumbnails.cpu-permits=6

# Image Tagger Service (ONNX)
app.tagger.idle-eviction-minutes=5

# File Hashing
app.files.hash-chunk-size-kb=64

# Duplicate Detection
app.duplicates.dhash-threshold=2

# Database
app.db.backup-filename=library.db.bak
